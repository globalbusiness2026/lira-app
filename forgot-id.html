<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Forgot ID - LIRA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .forgot-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .forgot-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.5s ease;
            position: relative;
            overflow: hidden;
        }
        
        .forgot-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--gradient-1);
        }
        
        .forgot-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .forgot-header h1 {
            font-size: 32px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .forgot-header p {
            color: var(--gray);
            font-size: 14px;
        }
        
        .info-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 36px;
            animation: pulse 2s infinite;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }
        
        .input-group i {
            position: absolute;
            left: 15px;
            top: 38px;
            color: var(--primary);
        }
        
        .input-group .form-control {
            padding-left: 45px;
        }
        
        .success-message {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        .success-message i {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .back-to-login {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-to-login a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-to-login a:hover {
            text-decoration: underline;
        }
        
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .forgot-card {
                padding: 30px 20px;
            }
            
            .forgot-header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="forgot-container">
        <div class="forgot-card">
            <div class="info-icon">
                <i class="fas fa-question-circle"></i>
            </div>
            
            <div class="forgot-header">
                <h1>Forgot User ID?</h1>
                <p>Don't worry! Enter your registered email address and we'll send you your User ID.</p>
            </div>
            
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your registered email" required>
            </div>
            
            <button class="btn btn-primary" style="width: 100%;" onclick="sendUserId()" id="sendBtn">
                <span class="loader" id="loader"></span>
                <span id="btnText">Send User ID</span>
            </button>
            
            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i>
                <h3>Email Sent Successfully!</h3>
                <p id="successText">Please check your email for your User ID.</p>
            </div>
            
            <div class="back-to-login">
                <a href="/login"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        async function sendUserId() {
            const email = document.getElementById('email').value;
            
            if (!email) {
                alert('Please enter your email address');
                return;
            }
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address');
                return;
            }
            
            const sendBtn = document.getElementById('sendBtn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            const successMessage = document.getElementById('successMessage');
            
            try {
                // Disable button and show loader
                sendBtn.disabled = true;
                loader.style.display = 'inline-block';
                btnText.textContent = ' Sending...';
                
                const response = await fetch('/api/forgot-id', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Hide the input and button
                    document.querySelector('.input-group').style.display = 'none';
                    sendBtn.style.display = 'none';
                    
                    // Show success message
                    successMessage.style.display = 'block';
                    
                    // Show email in success message
                    document.getElementById('successText').innerHTML = 
                        `We've sent your User ID to <strong>${email}</strong>. Please check your inbox.`;
                } else {
                    alert(data.error || 'Email not found. Please check and try again.');
                    
                    // Re-enable button
                    sendBtn.disabled = false;
                    loader.style.display = 'none';
                    btnText.textContent = 'Send User ID';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Something went wrong. Please try again later.');
                
                // Re-enable button
                sendBtn.disabled = false;
                loader.style.display = 'none';
                btnText.textContent = 'Send User ID';
            }
        }
        
        // Enter key press
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendUserId();
            }
        });
    </script>
</body>
</html>
