<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Income Reports - LIRA Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .report-container {
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        .page-header {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .chart-section {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .filter-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .income-table-container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }
        
        .table-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .table-tab {
            padding: 10px 25px;
            background: #f0f0f0;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .table-tab:hover,
        .table-tab.active {
            background: var(--primary);
            color: white;
        }
        
        .total-row {
            background: var(--gradient-1);
            color: white;
            font-weight: 700;
        }
        
        .total-row td {
            padding: 15px;
        }
        
        .export-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }
        
        @media (max-width: 768px) {
            .filter-grid {
                grid-template-columns: 1fr;
            }
            
            .table-tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Admin Navbar -->
    <nav class="navbar" style="background: #1e1e2f;">
        <div class="navbar-container">
            <a href="/admin-dashboard" class="logo" style="color: white;">LIRA Admin</a>
            <div class="nav-menu">
                <a href="/admin-dashboard" class="nav-link">Dashboard</a>
                <a href="/all-member" class="nav-link">Members</a>
                <a href="/income-settings" class="nav-link">Settings</a>
                <a href="/admin-income-report" class="nav-link active">Income Report</a>
                <a href="/payout" class="nav-link">Payouts</a>
                <div class="nav-link" onclick="logout()">Logout</div>
            </div>
        </div>
    </nav>

    <div class="report-container">
        <!-- Page Header -->
        <div class="page-header">
            <div class="page-title">
                <h1>Income Reports</h1>
                <p>Track all income distributions and lapsed income</p>
            </div>
            <button class="export-btn" onclick="exportReport()">
                <i class="fas fa-file-excel"></i> Export Report
            </button>
        </div>

        <!-- Summary Cards -->
        <div class="summary-cards" id="summaryCards">
            <!-- Loaded via JS -->
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-grid">
                <div>
                    <label>From Date</label>
                    <input type="date" class="form-control" id="fromDate">
                </div>
                <div>
                    <label>To Date</label>
                    <input type="date" class="form-control" id="toDate">
                </div>
                <div>
                    <label>User ID</label>
                    <input type="text" class="form-control" id="userId" placeholder="Enter User ID">
                </div>
                <div>
                    <label>Income Type</label>
                    <select class="form-control" id="incomeType">
                        <option value="all">All Types</option>
                        <option value="level">Level Income</option>
                        <option value="direct">Direct Income</option>
                        <option value="delivery">Delivery Commission</option>
                        <option value="royalty">Royalty</option>
                    </select>
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button class="btn btn-primary" onclick="applyFilter()">Apply Filter</button>
                </div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="chart-section">
            <div class="chart-header">
                <h3>Income Overview</h3>
                <select onchange="changeChartPeriod(this.value)">
                    <option value="7">Last 7 Days</option>
                    <option value="30" selected>Last 30 Days</option>
                    <option value="90">Last 90 Days</option>
                </select>
            </div>
            <canvas id="incomeChart" height="300"></canvas>
        </div>

        <!-- Income Tables -->
        <div class="income-table-container">
            <div class="table-tabs">
                <span class="table-tab active" onclick="switchTableTab('all')">All Income</span>
                <span class="table-tab" onclick="switchTableTab('credited')">Credited</span>
                <span class="table-tab" onclick="switchTableTab('lapsed')">Lapsed</span>
                <span class="table-tab" onclick="switchTableTab('byUser')">By User</span>
            </div>

            <div id="allIncomeTable" style="display: block;">
                <table class="member-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>User ID</th>
                            <th>Name</th>
                            <th>From User</th>
                            <th>Type</th>
                            <th>Level</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="allIncomeBody"></tbody>
                </table>
            </div>

            <div id="creditedIncomeTable" style="display: none;">
                <!-- Similar structure -->
            </div>

            <div id="lapsedIncomeTable" style="display: none;"></div>

            <div id="byUserTable" style="display: none;">
                <table class="member-table">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Name</th>
                            <th>Total Credited</th>
                            <th>Total Lapsed</th>
                            <th>Net Income</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="byUserBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let incomeChart;
        
        // Load report data
        async function loadReport() {
            // Implementation
        }
        
        function applyFilter() {
            loadReport();
        }
        
        function switchTableTab(tab) {
            // Implementation
        }
        
        function exportReport() {
            window.location.href = '/api/admin/income/export';
        }
        
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/admin-login';
        }
    </script>
</body>
</html>
