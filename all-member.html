<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Member Management - LIRA Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .member-container {
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        .page-header {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .page-title h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .page-title p {
            color: var(--gray);
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
        }
        
        .action-btn {
            padding: 12px 25px;
            background: var(--gradient-1);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }
        
        .filters-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .filter-label {
            font-weight: 600;
            font-size: 14px;
        }
        
        .filter-select, .filter-input {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .filter-actions {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .member-table-container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }
        
        .member-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }
        
        .member-table th {
            background: #f8f9fa;
            padding: 15px;
            font-weight: 600;
            text-align: left;
        }
        
        .member-table td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .member-table tr {
            transition: all 0.3s ease;
        }
        
        .member-table tr:hover {
            background: #f8f9fa;
        }
        
        .member-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .member-avatar {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .member-details {
            line-height: 1.4;
        }
        
        .member-name {
            font-weight: 600;
        }
        
        .member-id {
            font-size: 12px;
            color: var(--gray);
        }
        
        .status-badge {
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        
        .status-active {
            background: #d4edda;
            color: #155724;
        }
        
        .status-inactive {
            background: #f8d7da;
            color: #721c24;
        }
        
        .franchise-badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge-general { background: #e0e0e0; color: var(--dark); }
        .badge-micro { background: #c7d2fe; color: var(--primary-dark); }
        .badge-mini { background: #fed7aa; color: var(--warning); }
        .badge-max { background: #fecaca; color: var(--danger); }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .table-btn {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            border: none;
            background: #f0f0f0;
            color: var(--dark);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .table-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }
        
        .page-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .page-btn:hover,
        .page-btn.active {
            background: var(--primary);
            color: white;
        }
        
        /* Modal Styles */
        .member-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .member-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .wallet-control {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .wallet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }
        
        .wallet-edit {
            display: flex;
            gap: 10px;
        }
        
        .wallet-edit input {
            width: 120px;
            padding: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }
        
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                text-align: center;
            }
            
            .filter-grid {
                grid-template-columns: 1fr;
            }
            
            .filter-actions {
                flex-direction: column;
            }
            
            .action-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Admin Navbar -->
    <nav class="navbar" style="background: #1e1e2f;">
        <div class="navbar-container">
            <a href="/admin-dashboard" class="logo" style="color: white;">LIRA Admin</a>
            <div class="mobile-menu-btn" style="color: white;">
                <i class="fas fa-bars"></i>
            </div>
            <div class="nav-menu">
                <a href="/admin-dashboard" class="nav-link" style="color: white;">Dashboard</a>
                <a href="/all-member" class="nav-link active" style="color: white;">Members</a>
                <a href="/add-product" class="nav-link" style="color: white;">Products</a>
                <a href="/payout" class="nav-link" style="color: white;">Payouts</a>
                <a href="/admin-franchise" class="nav-link" style="color: white;">Franchise</a>
                <a href="/admin-message" class="nav-link" style="color: white;">
                    <i class="fas fa-comment"></i>
                    <span class="message-badge" id="unreadCount">0</span>
                </a>
                <div class="nav-link" onclick="logout()" style="cursor: pointer; color: white;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </div>
        </div>
    </nav>

    <div class="member-container">
        <!-- Page Header -->
        <div class="page-header">
            <div class="page-title">
                <h1>Member Management</h1>
                <p>View and manage all registered members</p>
            </div>
            <div class="header-actions">
                <button class="action-btn" onclick="exportMembers()">
                    <i class="fas fa-download"></i> Export
                </button>
                <button class="action-btn" onclick="sendBulkMessage()">
                    <i class="fas fa-envelope"></i> Bulk Message
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-section">
            <div class="filter-grid">
                <div class="filter-group">
                    <label class="filter-label">Search</label>
                    <input type="text" class="filter-input" id="searchInput" placeholder="Name, ID, Email, Mobile...">
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Status</label>
                    <select class="filter-select" id="statusFilter">
                        <option value="all">All Status</option>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Franchise Stage</label>
                    <select class="filter-select" id="franchiseFilter">
                        <option value="all">All</option>
                        <option value="general">General</option>
                        <option value="micro">Micro</option>
                        <option value="mini">Mini</option>
                        <option value="max">Max</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Join Date</label>
                    <input type="date" class="filter-input" id="dateFilter">
                </div>
                
                <div class="filter-actions">
                    <button class="btn btn-primary" onclick="applyFilters()">Apply</button>
                    <button class="btn btn-outline" onclick="resetFilters()">Reset</button>
                </div>
            </div>
        </div>

        <!-- Member Table -->
        <div class="member-table-container">
            <table class="member-table">
                <thead>
                    <tr>
                        <th>Member</th>
                        <th>Contact</th>
                        <th>Sponsor</th>
                        <th>Join Date</th>
                        <th>Status</th>
                        <th>Franchise</th>
                        <th>Wallet</th>
                        <th>12M Wallet</th>
                        <th>Directs</th>
                        <th>Level</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="memberTableBody">
                    <tr>
                        <td colspan="11" style="text-align: center; padding: 50px;">
                            <div class="loader"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Member Edit Modal -->
    <div class="member-modal" id="memberModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Edit Member</h2>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        
        // Check authentication
        async function checkAuth() {
            const session = await fetch('/api/session').then(r => r.json());
            if (!session.loggedIn || session.role !== 'admin') {
                window.location.href = '/admin-login';
                return false;
            }
            return true;
        }
        
        // Load members
        async function loadMembers(page = 1) {
            try {
                const search = document.getElementById('searchInput').value;
                const status = document.getElementById('statusFilter').value;
                const franchise = document.getElementById('franchiseFilter').value;
                const date = document.getElementById('dateFilter').value;
                
                let url = `/api/admin/members?page=${page}`;
                if (search) url += `&search=${search}`;
                if (status !== 'all') url += `&status=${status}`;
                if (franchise !== 'all') url += `&franchise=${franchise}`;
                if (date) url += `&date=${date}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                updateTable(data.members);
                updatePagination(data.totalPages, page);
                
            } catch (error) {
                console.error('Error loading members:', error);
            }
        }
        
        // Update table
        function updateTable(members) {
            const tbody = document.getElementById('memberTableBody');
            
            if (!members || members.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" style="text-align: center;">No members found</td></tr>';
                return;
            }
            
            tbody.innerHTML = members.map(member => `
                <tr>
                    <td>
                        <div class="member-info">
                            <div class="member-avatar">${member.name.charAt(0)}</div>
                            <div class="member-details">
                                <div class="member-name">${member.name}</div>
                                <div class="member-id">${member.userId}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div>${member.email}</div>
                        <div style="font-size: 12px; color: var(--gray);">${member.mobile}</div>
                    </td>
                    <td>${member.sponsorId || '-'}</td>
                    <td>${new Date(member.joinDate).toLocaleDateString()}</td>
                    <td>
                        <span class="status-badge status-${member.status}">
                            ${member.status}
                        </span>
                    </td>
                    <td>
                        <span class="franchise-badge badge-${member.franchiseStage}">
                            ${member.franchiseStage}
                        </span>
                    </td>
                    <td>₹${(member.wallet || 0).toLocaleString()}</td>
                    <td>₹${(member.wallet12Month || 0).toLocaleString()}</td>
                    <td>${member.directCount || 0}</td>
                    <td>Level ${member.level || 1}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="table-btn" onclick="editMember('${member.userId}')" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="table-btn" onclick="viewMember('${member.userId}')" title="View">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="table-btn" onclick="messageMember('${member.userId}')" title="Message">
                                <i class="fas fa-comment"></i>
                            </button>
                            <button class="table-btn" onclick="adjustWallet('${member.userId}')" title="Wallet">
                                <i class="fas fa-wallet"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        // Update pagination
        function updatePagination(total, current) {
            totalPages = total;
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            for (let i = 1; i <= total; i++) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === current ? 'active' : ''}`;
                btn.textContent = i;
                btn.onclick = () => {
                    currentPage = i;
                    loadMembers(i);
                };
                pagination.appendChild(btn);
            }
        }
        
        // Apply filters
        function applyFilters() {
            currentPage = 1;
            loadMembers(1);
        }
        
        // Reset filters
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('statusFilter').value = 'all';
            document.getElementById('franchiseFilter').value = 'all';
            document.getElementById('dateFilter').value = '';
            loadMembers(1);
        }
        
        // Edit member
        async function editMember(userId) {
            try {
                const response = await fetch(`/api/admin/members/${userId}`);
                const member = await response.json();
                
                const modal = document.getElementById('memberModal');
                const modalContent = document.getElementById('modalContent');
                
                modalContent.innerHTML = `
                    <form onsubmit="updateMember(event, '${userId}')">
                        <div class="form-group">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" value="${member.name}" id="editName">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" value="${member.email}" id="editEmail">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Mobile</label>
                            <input type="text" class="form-control" value="${member.mobile}" id="editMobile">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Status</label>
                            <select class="form-control" id="editStatus">
                                <option value="active" ${member.status === 'active' ? 'selected' : ''}>Active</option>
                                <option value="inactive" ${member.status === 'inactive' ? 'selected' : ''}>Inactive</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Franchise Stage</label>
                            <select class="form-control" id="editFranchise">
                                <option value="general" ${member.franchiseStage === 'general' ? 'selected' : ''}>General</option>
                                <option value="micro" ${member.franchiseStage === 'micro' ? 'selected' : ''}>Micro</option>
                                <option value="mini" ${member.franchiseStage === 'mini' ? 'selected' : ''}>Mini</option>
                                <option value="max" ${member.franchiseStage === 'max' ? 'selected' : ''}>Max</option>
                            </select>
                        </div>
                        
                        <div style="display: flex; gap: 10px; margin-top: 20px;">
                            <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                            <button type="submit" class="btn btn-primary">Update</button>
                        </div>
                    </form>
                `;
                
                modal.classList.add('active');
                
            } catch (error) {
                console.error('Error loading member:', error);
            }
        }
        
        // Update member
        async function updateMember(e, userId) {
            e.preventDefault();
            
            const data = {
                name: document.getElementById('editName').value,
                email: document.getElementById('editEmail').value,
                mobile: document.getElementById('editMobile').value,
                status: document.getElementById('editStatus').value,
                franchiseStage: document.getElementById('editFranchise').value
            };
            
            try {
                const response = await fetch(`/api/admin/members/${userId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Member updated successfully');
                    closeModal();
                    loadMembers(currentPage);
                }
            } catch (error) {
                console.error('Error updating member:', error);
            }
        }
        
        // Adjust wallet
        function adjustWallet(userId) {
            const modal = document.getElementById('memberModal');
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `
                <h3 style="margin-bottom: 20px;">Adjust Wallet</h3>
                
                <div class="wallet-control">
                    <div class="wallet-row">
                        <span>Main Wallet:</span>
                        <div class="wallet-edit">
                            <input type="number" id="mainWallet" placeholder="Amount">
                            <button class="btn btn-primary" onclick="updateWallet('${userId}', 'main', 'add')">Add</button>
                            <button class="btn btn-danger" onclick="updateWallet('${userId}', 'main', 'deduct')">Deduct</button>
                        </div>
                    </div>
                </div>
                
                <div class="wallet-control">
                    <div class="wallet-row">
                        <span>12-Month Wallet:</span>
                        <div class="wallet-edit">
                            <input type="number" id="twelveWallet" placeholder="Amount">
                            <button class="btn btn-primary" onclick="updateWallet('${userId}', 'twelve', 'add')">Add</button>
                            <button class="btn btn-danger" onclick="updateWallet('${userId}', 'twelve', 'deduct')">Deduct</button>
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 20px;">
                    <button class="btn btn-outline" onclick="closeModal()">Close</button>
                </div>
            `;
            
            modal.classList.add('active');
        }
        
        // Update wallet
        async function updateWallet(userId, walletType, action) {
            const amount = document.getElementById(walletType === 'main' ? 'mainWallet' : 'twelveWallet').value;
            
            if (!amount || amount <= 0) {
                alert('Please enter valid amount');
                return;
            }
            
            try {
                const response = await fetch('/api/admin/wallet-update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId,
                        walletType,
                        action,
                        amount: parseFloat(amount)
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Wallet updated successfully');
                    closeModal();
                    loadMembers(currentPage);
                }
            } catch (error) {
                console.error('Error updating wallet:', error);
            }
        }
        
        // View member
        function viewMember(userId) {
            window.location.href = `/profile?view=${userId}`;
        }
        
        // Message member
        function messageMember(userId) {
            window.location.href = `/admin-message?user=${userId}`;
        }
        
        // Export members
        function exportMembers() {
            window.location.href = '/api/admin/members/export';
        }
        
        // Send bulk message
        function sendBulkMessage() {
            // Implement bulk message functionality
            alert('Bulk message feature coming soon');
        }
        
        // Close modal
        function closeModal() {
            document.getElementById('memberModal').classList.remove('active');
        }
        
        // Logout
        async function logout() {
            if (confirm('Are you sure you want to logout?')) {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/admin-login';
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            if (await checkAuth()) {
                loadMembers();
            }
        });
    </script>
</body>
</html>
