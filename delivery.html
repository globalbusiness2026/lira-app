<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Delivery Management - LIRA Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .delivery-container {
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        .page-header {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            color: white;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }
        
        .page-header::before {
            content: '🚚';
            position: absolute;
            right: -20px;
            bottom: -20px;
            font-size: 150px;
            opacity: 0.1;
            transform: rotate(-15deg);
        }
        
        .page-header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .page-header p {
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        
        .stat-content {
            flex: 1;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--dark);
        }
        
        .stat-label {
            color: var(--gray);
            font-size: 14px;
        }
        
        .filter-section {
            background: white;
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .filter-label {
            font-weight: 600;
            font-size: 14px;
        }
        
        .filter-select, .filter-input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .filter-select:focus, .filter-input:focus {
            border-color: var(--success);
            outline: none;
            box-shadow: 0 0 0 3px rgba(67, 233, 123, 0.1);
        }
        
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 12px 30px;
            background: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }
        
        .tab-btn:hover {
            transform: translateY(-2px);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
        
        .delivery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .delivery-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border-left: 4px solid transparent;
        }
        
        .delivery-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
        }
        
        .delivery-card.pending {
            border-left-color: var(--warning);
        }
        
        .delivery-card.assigned {
            border-left-color: var(--info);
        }
        
        .delivery-card.in_transit {
            border-left-color: var(--primary);
        }
        
        .delivery-card.delivered {
            border-left-color: var(--success);
        }
        
        .delivery-card.failed {
            border-left-color: var(--danger);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .order-id {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .priority-badge {
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .priority-high {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .priority-medium {
            background: #fed7aa;
            color: #c2410c;
        }
        
        .priority-low {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .customer-info {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .info-row {
            display: flex;
            margin: 8px 0;
        }
        
        .info-label {
            width: 80px;
            color: var(--gray);
            font-size: 13px;
        }
        
        .info-value {
            flex: 1;
            font-weight: 500;
        }
        
        .product-list {
            margin: 15px 0;
        }
        
        .product-header {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 2px solid #f0f0f0;
            font-weight: 600;
        }
        
        .product-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #f0f0f0;
        }
        
        .product-name {
            font-size: 13px;
        }
        
        .product-qty {
            font-weight: 600;
            color: var(--primary);
        }
        
        .product-price {
            font-weight: 600;
            color: var(--success);
        }
        
        .timeline {
            margin: 20px 0;
            position: relative;
            padding-left: 30px;
        }
        
        .timeline-item {
            position: relative;
            padding-bottom: 20px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            z-index: 2;
        }
        
        .timeline-item::after {
            content: '';
            position: absolute;
            left: -16px;
            top: 12px;
            width: 2px;
            height: 100%;
            background: #e0e0e0;
            z-index: 1;
        }
        
        .timeline-item:last-child::after {
            display: none;
        }
        
        .timeline-time {
            font-size: 11px;
            color: var(--gray);
            margin-bottom: 3px;
        }
        
        .timeline-text {
            font-weight: 500;
        }
        
        .timeline-status {
            font-size: 11px;
            color: var(--success);
        }
        
        .assign-section {
            background: linear-gradient(135deg, #f5f0ff 0%, #ffffff 100%);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            border: 2px dashed var(--primary);
        }
        
        .franchise-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .franchise-select:focus {
            border-color: var(--primary);
            outline: none;
        }
        
        .assign-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .assign-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 233, 123, 0.3);
        }
        
        .tracking-map {
            height: 200px;
            background: linear-gradient(45deg, #f0f0f0 25%, #e0e0e0 25%, #e0e0e0 50%, #f0f0f0 50%, #f0f0f0 75%, #e0e0e0 75%, #e0e0e0 100%);
            background-size: 20px 20px;
            border-radius: 15px;
            margin: 15px 0;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .map-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .tracking-map:hover .map-overlay {
            opacity: 1;
        }
        
        .delivery-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .track-btn {
            background: var(--info);
            color: white;
        }
        
        .contact-btn {
            background: var(--primary);
            color: white;
        }
        
        .complete-btn {
            background: var(--success);
            color: white;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }
        
        .page-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .page-btn:hover,
        .page-btn.active {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
        
        /* Modal Styles */
        .delivery-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .delivery-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 700;
        }
        
        .modal-close {
            font-size: 24px;
            cursor: pointer;
            color: var(--gray);
        }
        
        .modal-close:hover {
            color: var(--danger);
        }
        
        .live-tracking {
            height: 300px;
            background: #1e1e2f;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }
        
        .tracking-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }
        
        .eta-info {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }
        
        .driver-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .driver-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 700;
        }
        
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 28px;
            }
            
            .filter-grid {
                grid-template-columns: 1fr;
            }
            
            .delivery-grid {
                grid-template-columns: 1fr;
            }
            
            .delivery-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Admin Navbar -->
    <nav class="navbar" style="background: #1e1e2f;">
        <div class="navbar-container">
            <a href="/admin-dashboard" class="logo" style="color: white;">LIRA Admin</a>
            <div class="mobile-menu-btn" style="color: white;">
                <i class="fas fa-bars"></i>
            </div>
            <div class="nav-menu">
                <a href="/admin-dashboard" class="nav-link">Dashboard</a>
                <a href="/admin-franchise" class="nav-link">Franchise</a>
                <a href="/franchise-activity" class="nav-link">Activity</a>
                <a href="/delivery" class="nav-link active">Delivery</a>
                <a href="/payout" class="nav-link">Payouts</a>
                <div class="nav-link" onclick="logout()" style="cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </div>
        </div>
    </nav>

    <div class="delivery-container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>Delivery Management</h1>
            <p>Complete control over all deliveries - assign, track, and manage</p>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid" id="statsGrid">
            <!-- Loaded via JS -->
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-grid">
                <div class="filter-group">
                    <label class="filter-label">Status</label>
                    <select class="filter-select" id="statusFilter" onchange="applyFilters()">
                        <option value="all">All Deliveries</option>
                        <option value="pending">Pending</option>
                        <option value="assigned">Assigned</option>
                        <option value="in_transit">In Transit</option>
                        <option value="delivered">Delivered</option>
                        <option value="failed">Failed</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Franchise</label>
                    <select class="filter-select" id="franchiseFilter" onchange="applyFilters()">
                        <option value="all">All Franchise</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Date Range</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="date" class="filter-input" id="fromDate" onchange="applyFilters()">
                        <input type="date" class="filter-input" id="toDate" onchange="applyFilters()">
                    </div>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Search</label>
                    <input type="text" class="filter-input" id="searchInput" placeholder="Order ID, Customer, Phone" onkeyup="applyFilters()">
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('all')">All Deliveries</button>
            <button class="tab-btn" onclick="switchTab('pending')">Pending</button>
            <button class="tab-btn" onclick="switchTab('assigned')">Assigned</button>
            <button class="tab-btn" onclick="switchTab('in_transit')">In Transit</button>
            <button class="tab-btn" onclick="switchTab('delivered')">Delivered</button>
            <button class="tab-btn" onclick="switchTab('failed')">Failed</button>
        </div>

        <!-- Delivery Grid -->
        <div class="delivery-grid" id="deliveryGrid">
            <!-- Loaded via JS -->
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Assign Delivery Modal -->
    <div class="delivery-modal" id="assignModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Assign Delivery</div>
                <div class="modal-close" onclick="closeAssignModal()">&times;</div>
            </div>
            
            <div id="assignDetails"></div>
            
            <div class="assign-section">
                <label class="form-label">Select Franchise</label>
                <select class="franchise-select" id="franchiseSelect">
                    <option value="">Choose franchise...</option>
                </select>
                
                <label class="form-label" style="margin-top: 15px;">Estimated Delivery Time</label>
                <input type="datetime-local" class="franchise-select" id="estimatedTime">
                
                <button class="assign-btn" onclick="confirmAssign()">
                    <i class="fas fa-check-circle"></i> Assign Delivery
                </button>
            </div>
        </div>
    </div>

    <!-- Live Tracking Modal -->
    <div class="delivery-modal" id="trackingModal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <div class="modal-title">Live Tracking</div>
                <div class="modal-close" onclick="closeTrackingModal()">&times;</div>
            </div>
            
            <div class="live-tracking" id="liveMap">
                <!-- Map would be integrated here -->
                <div class="tracking-info" id="trackingInfo"></div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let currentDelivery = null;
        let deliveries = [];
        
        // Check authentication
        async function checkAuth() {
            const session = await fetch('/api/session').then(r => r.json());
            if (!session.loggedIn || session.role !== 'admin') {
                window.location.href = '/admin-login';
                return false;
            }
            return true;
        }
        
        // Load deliveries
        async function loadDeliveries(page = 1) {
            try {
                const status = document.getElementById('statusFilter').value;
                const franchise = document.getElementById('franchiseFilter').value;
                const fromDate = document.getElementById('fromDate').value;
                const toDate = document.getElementById('toDate').value;
                const search = document.getElementById('searchInput').value;
                
                let url = `/api/admin/deliveries?page=${page}`;
                if (status !== 'all') url += `&status=${status}`;
                if (franchise !== 'all') url += `&franchise=${franchise}`;
                if (fromDate) url += `&from=${fromDate}`;
                if (toDate) url += `&to=${toDate}`;
                if (search) url += `&search=${search}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                deliveries = data.deliveries;
                updateStats(data.stats);
                updateDeliveryGrid(data.deliveries);
                updatePagination(data.totalPages, page);
                
            } catch (error) {
                console.error('Error loading deliveries:', error);
            }
        }
        
        // Update stats
        function updateStats(stats) {
            const statsGrid = document.getElementById('statsGrid');
            
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-content">
                        <div class="stat-value">${stats.pending}</div>
                        <div class="stat-label">Pending</div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-truck"></i></div>
                    <div class="stat-content">
                        <div class="stat-value">${stats.assigned}</div>
                        <div class="stat-label">Assigned</div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-content">
                        <div class="stat-value">${stats.delivered}</div>
                        <div class="stat-label">Delivered Today</div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="stat-content">
                        <div class="stat-value">${stats.failed}</div>
                        <div class="stat-label">Failed</div>
                    </div>
                </div>
            `;
        }
        
        // Update delivery grid
        function updateDeliveryGrid(deliveries) {
            const grid = document.getElementById('deliveryGrid');
            
            if (!deliveries || deliveries.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 50px;">No deliveries found</div>';
                return;
            }
            
            grid.innerHTML = deliveries.map(d => `
                <div class="delivery-card ${d.status}">
                    <div class="card-header">
                        <span class="order-id">#${d.orderId}</span>
                        <span class="priority-badge priority-${d.priority || 'medium'}">
                            ${d.priority || 'Normal'}
                        </span>
                    </div>
                    
                    <div class="customer-info">
                        <div class="info-row">
                            <span class="info-label">Customer:</span>
                            <span class="info-value">${d.customerName}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Phone:</span>
                            <span class="info-value">${d.customerPhone}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Address:</span>
                            <span class="info-value">${d.address}</span>
                        </div>
                    </div>
                    
                    <div class="product-list">
                        <div class="product-header">
                            <span>Product</span>
                            <span>Qty</span>
                            <span>Price</span>
                        </div>
                        ${d.products.map(p => `
                            <div class="product-item">
                                <span class="product-name">${p.name}</span>
                                <span class="product-qty">${p.quantity}</span>
                                <span class="product-price">₹${p.price * p.quantity}</span>
                            </div>
                        `).join('')}
                    </div>
                    
                    ${d.status === 'assigned' || d.status === 'in_transit' ? `
                        <div class="timeline">
                            ${d.timeline?.map(event => `
                                <div class="timeline-item">
                                    <div class="timeline-time">${new Date(event.time).toLocaleString()}</div>
                                    <div class="timeline-text">${event.text}</div>
                                    <div class="timeline-status">${event.status}</div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="tracking-map" onclick="openTracking('${d.deliveryId}')">
                            <div class="map-overlay">
                                <i class="fas fa-expand"></i> View Live Tracking
                            </div>
                        </div>
                    ` : ''}
                    
                    ${d.status === 'pending' ? `
                        <div class="assign-section">
                            <button class="assign-btn" onclick="openAssignModal('${d.orderId}')">
                                <i class="fas fa-truck"></i> Assign to Franchise
                            </button>
                        </div>
                    ` : ''}
                    
                    <div class="delivery-actions">
                        ${d.status === 'assigned' ? `
                            <button class="action-btn track-btn" onclick="openTracking('${d.deliveryId}')">
                                <i class="fas fa-map-marker-alt"></i> Track
                            </button>
                        ` : ''}
                        <button class="action-btn contact-btn" onclick="contactCustomer('${d.customerPhone}')">
                            <i class="fas fa-phone"></i> Contact
                        </button>
                        ${d.franchiseId ? `
                            <button class="action-btn contact-btn" onclick="contactFranchise('${d.franchiseId}')">
                                <i class="fas fa-store"></i> Franchise
                            </button>
                        ` : ''}
                        ${d.status === 'in_transit' ? `
                            <button class="action-btn complete-btn" onclick="markDelivered('${d.deliveryId}')">
                                <i class="fas fa-check"></i> Complete
                            </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        // Update pagination
        function updatePagination(total, current) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            for (let i = 1; i <= total; i++) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === current ? 'active' : ''}`;
                btn.textContent = i;
                btn.onclick = () => {
                    currentPage = i;
                    loadDeliveries(i);
                };
                pagination.appendChild(btn);
            }
        }
        
        // Open assign modal
        async function openAssignModal(orderId) {
            currentDelivery = orderId;
            
            try {
                const response = await fetch('/api/admin/franchise/available');
                const franchises = await response.json();
                
                const select = document.getElementById('franchiseSelect');
                select.innerHTML = '<option value="">Choose franchise...</option>' + 
                    franchises.map(f => `<option value="${f.userId}">${f.name} (${f.mobile}) - Available</option>`).join('');
                
                document.getElementById('assignModal').classList.add('active');
                
            } catch (error) {
                console.error('Error loading franchises:', error);
            }
        }
        
        // Confirm assign
        async function confirmAssign() {
            const franchiseId = document.getElementById('franchiseSelect').value;
            const estimatedTime = document.getElementById('estimatedTime').value;
            
            if (!franchiseId) {
                alert('Please select a franchise');
                return;
            }
            
            try {
                const response = await fetch('/api/admin/delivery/assign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        orderId: currentDelivery,
                        franchiseId: franchiseId,
                        estimatedTime: estimatedTime
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Delivery assigned successfully');
                    closeAssignModal();
                    loadDeliveries(currentPage);
                }
            } catch (error) {
                console.error('Error assigning delivery:', error);
            }
        }
        
        // Open tracking
        function openTracking(deliveryId) {
            const delivery = deliveries.find(d => d.deliveryId === deliveryId);
            
            document.getElementById('trackingInfo').innerHTML = `
                <div class="eta-info">
                    <span>Estimated Delivery:</span>
                    <span><strong>${delivery.estimatedTime || '30 mins'}</strong></span>
                </div>
                <div class="driver-info">
                    <div class="driver-avatar">${delivery.franchiseName?.charAt(0)}</div>
                    <div>
                        <div><strong>${delivery.franchiseName}</strong></div>
                        <div style="font-size: 12px;">${delivery.franchisePhone}</div>
                    </div>
                </div>
                <div style="margin-top: 10px;">
                    Current Location: Near ${delivery.currentLocation || 'Customer location'}
                </div>
            `;
            
            document.getElementById('trackingModal').classList.add('active');
        }
        
        // Mark as delivered
        async function markDelivered(deliveryId) {
            if (!confirm('Mark this delivery as completed?')) return;
            
            try {
                const response = await fetch('/api/admin/delivery/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ deliveryId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Delivery marked as completed');
                    loadDeliveries(currentPage);
                }
            } catch (error) {
                console.error('Error completing delivery:', error);
            }
        }
        
        // Contact customer
        function contactCustomer(phone) {
            window.location.href = `tel:${phone}`;
        }
        
        // Contact franchise
        function contactFranchise(franchiseId) {
            window.location.href = `/admin-message?user=${franchiseId}`;
        }
        
        // Apply filters
        function applyFilters() {
            currentPage = 1;
            loadDeliveries(1);
        }
        
        // Switch tab
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('statusFilter').value = tab;
            applyFilters();
        }
        
        // Close modals
        function closeAssignModal() {
            document.getElementById('assignModal').classList.remove('active');
        }
        
        function closeTrackingModal() {
            document.getElementById('trackingModal').classList.remove('active');
        }
        
        // Logout
        async function logout() {
            if (confirm('Are you sure you want to logout?')) {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/admin-login';
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            if (await checkAuth()) {
                loadDeliveries();
                
                // Set default dates
                const today = new Date();
                const thirtyDaysAgo = new Date(today.setDate(today.getDate() - 30));
                document.getElementById('fromDate').valueAsDate = thirtyDaysAgo;
                document.getElementById('toDate').valueAsDate = new Date();
            }
        });
    </script>
</body>
</html>
